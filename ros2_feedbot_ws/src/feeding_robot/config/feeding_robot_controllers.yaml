controller_manager:
  ros__parameters:
    update_rate: 50  # Hz (matched to 57600 baud Dynamixel comms)

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - base_y_joint
      - lower_z_joint
      - upper_z_joint
      - feeder_joint

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

      base_y_joint:
        trajectory: 0.1
        goal: 0.05
      lower_z_joint:
        trajectory: 0.1
        goal: 0.05
      upper_z_joint:
        trajectory: 0.1
        goal: 0.05
      feeder_joint:
        trajectory: 0.1
        goal: 0.05
