controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    allow_partial_joints_goal: false
    open_loop_control: false

    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 0.0

    gains:
      joint1: {p: 100.0, i: 0.0, d: 10.0}
      joint2: {p: 80.0,  i: 0.0, d: 8.0}
      joint3: {p: 60.0,  i: 0.0, d: 6.0}
      joint4: {p: 40.0,  i: 0.0, d: 4.0}

