controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint1_controller:
      type: effort_controllers/JointPositionController

    joint2_controller:
      type: effort_controllers/JointPositionController

    joint3_controller:
      type: effort_controllers/JointPositionController

    joint4_controller:
      type: effort_controllers/JointPositionController

joint1_controller:
  ros__parameters:
    joint: joint1
    pid: {p: 10.0, i: 0.0, d: 0.1}

joint2_controller:
  ros__parameters:
    joint: joint2
    pid: {p: 10.0, i: 0.0, d: 0.1}

joint3_controller:
  ros__parameters:
    joint: joint3
    pid: {p: 10.0, i: 0.0, d: 0.1}

joint4_controller:
  ros__parameters:
    joint: joint4
    pid: {p: 10.0, i: 0.0, d: 0.1}

