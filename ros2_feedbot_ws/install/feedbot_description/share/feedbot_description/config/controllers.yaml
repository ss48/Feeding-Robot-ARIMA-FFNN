controller_manager: 

  ros__parameters: 

    update_rate: 300 

  

    joint_state_broadcaster: 

      type: joint_state_broadcaster/JointStateBroadcaster 

  

    joint1_controller: 

      type: pid_controller/PidController 

    joint2_controller: 

      type: pid_controller/PidController 

    joint3_controller: 

      type: pid_controller/PidController 

    joint4_controller: 

      type: pid_controller/PidController 

  

joint1_controller: 

  ros__parameters: 

    dof_names: ["joint1"] 

    command_interface: effort 

    reference_and_state_interfaces: ["position", "velocity"] 

    gains: 

      joint1: {p: 180.0, i: 0.02, d: 8.0} 

  

joint2_controller: 

  ros__parameters: 

    dof_names: ["joint2"] 

    command_interface: effort 

    reference_and_state_interfaces: ["position", "velocity"] 

    gains: 

      joint2: 

        p: 150.0 

        i: 0.15 

        d: 10.0 

        i_clamp_max: 1.0 

        i_clamp_min: -1.0 

  

joint3_controller: 

  ros__parameters: 

    dof_names: ["joint3"] 

    command_interface: effort 

    reference_and_state_interfaces: ["position", "velocity"] 

    gains: 

      joint3:  

        p: 120.0 

        i: 0.05 

        d: 8.0 

        i_clamp_max: 1.0 

        i_clamp_min: -1.0 

  

joint4_controller: 

  ros__parameters: 

    dof_names: ["joint4"] 

    command_interface: effort 

    reference_and_state_interfaces: ["position", "velocity"] 

    gains: 

      joint4:   

        p: 60.0 

        i: 0.02 

        d: 6.0 

        i_clamp_max: 1.0 

        i_clamp_min: -1.0 
